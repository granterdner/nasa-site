<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>

  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">

    <!-- Header -->
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <!-- Filters -->
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="getImagesBtn">Get Space Images</button>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

  </div>

  <!-- Modal -->
  <div id="imageModal" class="modal hidden">
    <div id="modalOverlay" class="modal-overlay"></div>

    <div class="modal-content">
      <button id="closeModalBtn" class="close-modal" aria-label="Close modal">
        &times;
      </button>

      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
